<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../css/expanding-search-box.css">
        <title>Search Box - Expanding</title>
    </head>

    <body>
        <div class="searchBox">
            <div class="search"><ion-icon name="search-outline"></ion-icon></div>
            <div class="searchInput">
                <input type="text" placeholder="Search Here" id="search-input">
            </div>
            <div class="close"><ion-icon name="close-outline"></ion-icon></div>
        </div>
        <div class='training-callout'>
            <p>Code borrowed from <a href='https://www.youtube.com/@OnlineTutorialsYT' target='_blank'>OnlineTutorialsYT</a> YouTube channel. <strong>For my training purposes only</strong></p>
            <p>I recommend viewing his channel, I have learned a lot of very useful information and techniques.</p>
            <p>Thank you <a href="https://www.youtube.com/@KevinPowell" target='_blank'>Kevin Powell</a> for some very enlightening CSS information.</p>
        </div>

        <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

        <script src="../scripts/search-box.js" type="text/javascript"></script>
    </body>

</html>
