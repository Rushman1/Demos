<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSS Grid Image Hover Effects</title>
        <link rel="stylesheet" href="../css/gallery-hover.css">
    </head>

    <body>
        <div class="container">
            <div class="box one" style="--img:url(../images/starlord.png);" data-text="Star Lord"></div>
            <div class="box two" style="--img:url(../images/spiderman.png);" data-text="Spiderman"></div>
            <div class="box three" style="--img:url(../images/iron-man.png);" data-text="Iron Man"></div>
            <div class="box four" style="--img:url(../images/black-widow.png);" data-text="Black Widow"></div>
            <div class="box five" style="--img:url(../images/captain-america.png);" data-text="Captian America"></div>
        </div>
        <div class='training-callout'>
            <p>Code borrowed from <a href='https://www.youtube.com/@OnlineTutorialsYT' target='_blank'>OnlineTutorialsYT</a> YouTube channel. <strong>For my training purposes only</strong></p>
            <p>I recommend viewing his channel, I have learned a lot of very useful information and techniques.</p>
            <p>Thank you <a href="https://www.youtube.com/@KevinPowell" target='_blank'>Kevin Powell</a> for some very enlightening CSS information.</p>
        </div>
        <script src="../scripts/gallery-hover.js" type="text/javascript"></script>
    </body>

</html>
