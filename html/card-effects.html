<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sci-fi Card Effect</title>
        <link rel="stylesheet" href="../css/card-effects.css">
    </head>

    <body>
        <div class="container">
            <div class="box" style="--clr:#f00">
                <ion-icon name="brush-outline"></ion-icon>
                <h2>01<br />
                    <small>Design</small>
                </h2>
                <div class="clip">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            <div class="box" style="--clr:#0f0">
                <ion-icon name="code-slash-outline"></ion-icon>
                <h2>02<br />
                    <small>Code</small>
                </h2>
                <div class="clip">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            <div class="box" style="--clr:#f0f">
                <ion-icon name="rocket-outline"></ion-icon>
                <h2>03<br />
                    <small>Launch</small>
                </h2>
                <div class="clip">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
        <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
        <script src="../scripts/card-effect.js" type="text/javascript"></script>
