<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>CSS Glassmorphism Cards</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="stylesheet" href="../css/glassmorphism-cards.css ">
    </head>

    <body>

        <div class="container">
            <div class="glass" style="--r:-15" data-text="Design">
                <i class="fa-regular fa-pen-to-square"></i>
            </div>
            <div class="glass" style="--r:5" data-text="Code">
                <i class="fa-solid fa-code"></i>
            </div>
            <div class="glass" style="--r:25" data-text="Launch">
                <i class="fa-solid fa-rocket"></i>
            </div>
            <div class="glass" style="--r:-15" data-text="Earn">
                <i class="fa-solid fa-money-check-dollar"></i>
            </div>
        </div>
        <div class='training-callout'>
            <p>Code borrowed from <a href='https://www.youtube.com/@OnlineTutorialsYT' target='_blank'>OnlineTutorialsYT</a> YouTube channel. <strong>For my training purposes only</strong></p>
            <p>I recommend viewing his channel, I have learned a lot of very useful information and techniques.</p>
            <p>Thank you <a href="https://www.youtube.com/@KevinPowell" target='_blank'>Kevin Powell</a> for some very enlightening CSS information.</p>
        </div>

        <script src="../scripts/glassmorphism-cards.js" type="text/javascript"></script>
    </body>

</html>
